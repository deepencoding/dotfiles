# ~/.tmux.conf

# ── Basics ────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,ghostty:RGB"
set -g base-index 1                    # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10                 # no delay on Esc (matters for nvim)
set -g focus-events on

# Mouse ON while you transition. Turn off later to force keyboard habits:
set -g mouse on

# ── Prefix stays C-b (default). Muscle memory transfers to any server. ─

# ── Splits & windows (intuitive keys, open in current path) ───────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Vim-style pane navigation ─────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize with capital HJKL (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode = vi ────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Quality of life ───────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "config reloaded"

# ── Status bar (quiet) ────────────────────────────────────────────────
set -g status-style "bg=default,fg=colour244"
set -g status-left "#[bold]#S "
set -g status-right "%a %d %b  %H:%M"
setw -g window-status-current-style "fg=colour255,bold"
